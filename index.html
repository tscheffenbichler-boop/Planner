<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchulPlaner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ded5;
    --text: #1a1814; --text2: #6b6660; --text3: #9e9992;
    --accent: #2d5016; --accent-light: #e8f0e0; --danger: #c0392b;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08); --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform .3s; }
  .main { margin-left: 240px; flex: 1; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .content { padding: 28px 24px; max-width: 1100px; }
  .logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); }
  .logo-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .nav { padding: 12px 10px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--text2); transition: all .15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); padding: 14px 12px 6px; font-weight: 500; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1e380e; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-icon { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); cursor: pointer; font-size: 16px; transition: all .15s; }
  .btn-icon:hover { background: var(--border); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-sm { padding: 14px 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .form-group { margin-bottom: 16px; }
  label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  input, textarea, select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); transition: border .15s; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-md); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text2); }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .tag-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 300; flex-direction: column; gap: 16px; }
  .loading-logo { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--accent); }
  .loading-text { color: var(--text2); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-month { font-family: 'DM Serif Display', serif; font-size: 18px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-name { text-align: center; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); padding: 6px 0; }
  .cal-day { min-height: 72px; border-radius: var(--radius-sm); padding: 6px; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
  .cal-day:hover { background: var(--surface2); border-color: var(--border); }
  .cal-day.today { background: var(--accent-light); border-color: var(--accent); }
  .cal-day.today .cal-num { color: var(--accent); font-weight: 600; }
  .cal-day.other-month .cal-num { color: var(--text3); }
  .cal-num { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .cal-events { display: flex; flex-direction: column; gap: 2px; }
  .cal-event-pill { font-size: 10px; padding: 1px 5px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .timeline-container { position: relative; padding-left: 32px; }
  .timeline-line { position: absolute; left: 12px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 20px; }
  .timeline-dot { position: absolute; left: -26px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--surface); }
  .timeline-date { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .timeline-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .timeline-title { font-size: 14px; font-weight: 500; }
  .timeline-note { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: box-shadow .15s; cursor: pointer; }
  .note-card:hover { box-shadow: var(--shadow); }
  .note-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .note-body { font-size: 13px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .note-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .note-date { font-size: 11px; color: var(--text3); }
  .cat-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .cat-color { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 14px; font-weight: 500; flex: 1; }
  .cat-count { font-size: 12px; color: var(--text3); }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .stat-val { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; }
  .mobile-nav-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px; }
  .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .flex-center { display: flex; align-items: center; }
  .gap-8 { gap: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .color-swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color .15s; }
  .color-swatch.selected { border-color: var(--text); }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .mobile-nav-toggle { display: flex; }
    .mobile-overlay.visible { display: block; }
    .grid-2, .grid-4 { grid-template-columns: 1fr 1fr; }
    .content { padding: 20px 16px; }
    .cal-day { min-height: 50px; }
    .cal-event-pill { display: none; }
  }
  @media (max-width: 480px) {
    .grid-2, .grid-4 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="loading-logo">SchulPlaner</div>
  <div class="spinner"></div>
  <div class="loading-text">Verbinde mit Datenbank…</div>
</div>

<div id="app" class="app-shell" style="display:none;">
  <div class="mobile-overlay" id="mobile-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-title">SchulPlaner</div>
      <div class="logo-sub">Schuljahr-Organizer</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Übersicht</div>
      <button class="nav-item active" data-view="dashboard" onclick="showView('dashboard')"><span class="nav-icon">🏠</span> Dashboard</button>
      <div class="nav-section">Planen</div>
      <button class="nav-item" data-view="kalender" onclick="showView('kalender')"><span class="nav-icon">📅</span> Kalender</button>
      <button class="nav-item" data-view="zeitstrahl" onclick="showView('zeitstrahl')"><span class="nav-icon">📌</span> Zeitstrahl</button>
      <div class="nav-section">Lernen</div>
      <button class="nav-item" data-view="notizen" onclick="showView('notizen')"><span class="nav-icon">📝</span> Notizen</button>
      <div class="nav-section">Einstellungen</div>
      <button class="nav-item" data-view="kategorien" onclick="showView('kategorien')"><span class="nav-icon">🏷️</span> Kategorien</button>
    </nav>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="flex-center gap-8">
        <button class="mobile-nav-toggle" onclick="openSidebar()">☰</button>
        <span class="page-title" id="page-title">Dashboard</span>
      </div>
      <div class="flex-center gap-8" id="topbar-actions"></div>
    </header>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div id="modal-overlay" class="overlay" style="display:none;" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDocs, orderBy, query, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBxhpLFKu7qllMKIeIJd6SaLhIiHOrRoW0",
  authDomain: "organizer-b1a0c.firebaseapp.com",
  projectId: "organizer-b1a0c",
  storageBucket: "organizer-b1a0c.firebasestorage.app",
  messagingSenderId: "490464887761",
  appId: "1:490464887761:web:ec6b016a4e0cfb7817d6f0"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const COLORS = ['#2d5016','#8b4513','#1a5276','#6c3483','#117a65','#b7950b','#922b21','#1f618d','#196f3d','#784212'];
let state = { kategorien: [], termine: [], notizen: [], currentView: 'dashboard', calYear: new Date().getFullYear(), calMonth: new Date().getMonth() };
let selectedColor = COLORS[0];

async function loadKategorien() { const snap = await getDocs(query(collection(db,'kategorien'),orderBy('name'))); state.kategorien = snap.docs.map(d=>({id:d.id,...d.data()})); }
async function loadTermine() { const snap = await getDocs(query(collection(db,'termine'),orderBy('datum'))); state.termine = snap.docs.map(d=>({id:d.id,...d.data()})); }
async function loadNotizen() { const snap = await getDocs(query(collection(db,'notizen'),orderBy('geaendert_am','desc'))); state.notizen = snap.docs.map(d=>({id:d.id,...d.data()})); }
async function loadAll() { await Promise.all([loadKategorien(),loadTermine(),loadNotizen()]); }

async function init() {
  try {
    await loadAll();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    showView('dashboard');
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div class="loading-logo">SchulPlaner</div><div style="color:#c0392b;font-size:14px;text-align:center;max-width:320px;padding:0 20px;">Fehler: ${e.message}</div>`;
  }
}
init();

function getKat(id) { return state.kategorien.find(k=>k.id===id); }
function katBadge(id) { const k=getKat(id); if(!k) return ''; return `<span class="badge" style="background:${k.farbe}22;color:${k.farbe}"><span class="tag-dot" style="background:${k.farbe}"></span>${k.name}</span>`; }
function fmtDate(d) { if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateShort(d) { if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'short'}); }
function today() { return new Date().toISOString().split('T')[0]; }
function daysFromNow(d) { return Math.ceil((new Date(d)-new Date(today()))/86400000); }
function tsToDate(ts) { try { return ts?.toDate?.()?.toISOString?.()?.split('T')[0] || today(); } catch(e) { return today(); } }

window.showModal = (title,body) => { document.getElementById('modal-content').innerHTML=`<div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()">×</button></div>${body}`; document.getElementById('modal-overlay').style.display='flex'; };
window.closeModal = () => { document.getElementById('modal-overlay').style.display='none'; };
window.closeModalOnOverlay = (e) => { if(e.target===document.getElementById('modal-overlay')) closeModal(); };
window.openSidebar = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('mobile-overlay').classList.add('visible'); };
window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobile-overlay').classList.remove('visible'); };

window.showView = function(view) {
  state.currentView = view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===view));
  document.getElementById('page-title').textContent = {dashboard:'Dashboard',kalender:'Kalender',zeitstrahl:'Zeitstrahl',notizen:'Notizen',kategorien:'Kategorien'}[view];
  closeSidebar();
  document.getElementById('topbar-actions').innerHTML = {dashboard:'',kalender:`<button class="btn btn-primary btn-sm" onclick="openTerminModal()">+ Termin</button>`,zeitstrahl:`<button class="btn btn-primary btn-sm" onclick="openTerminModal()">+ Termin</button>`,notizen:`<button class="btn btn-primary btn-sm" onclick="openNotizModal()">+ Notiz</button>`,kategorien:`<button class="btn btn-primary btn-sm" onclick="openKatModal()">+ Kategorie</button>`}[view]||'';
  ({dashboard:renderDashboard,kalender:renderKalender,zeitstrahl:renderZeitstrahl,notizen:renderNotizen,kategorien:renderKategorien})[view]();
}

function renderDashboard() {
  const upcoming = state.termine.filter(t=>t.datum>=today()).slice(0,5);
  const bald = state.termine.filter(t=>{const d=daysFromNow(t.datum);return d>=0&&d<=7;}).length;
  document.getElementById('main-content').innerHTML = `
    <div class="grid-4 mb-20">
      <div class="stat"><div class="stat-val">${state.termine.filter(t=>t.datum>=today()).length}</div><div class="stat-label">Kommende Termine</div></div>
      <div class="stat"><div class="stat-val">${bald}</div><div class="stat-label">Diese Woche</div></div>
      <div class="stat"><div class="stat-val">${state.notizen.length}</div><div class="stat-label">Notizen gesamt</div></div>
      <div class="stat"><div class="stat-val">${state.kategorien.length}</div><div class="stat-label">Kategorien</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="flex-between mb-16"><span style="font-weight:500;font-size:15px;">Nächste Termine</span><button class="btn btn-secondary btn-sm" onclick="showView('kalender')">Alle →</button></div>
        ${upcoming.length ? upcoming.map(t=>{const d=daysFromNow(t.datum);const u=d===0?'var(--danger)':d<=2?'#b7950b':'var(--accent)';return `<div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border);"><div><div style="font-size:14px;font-weight:500;">${t.titel}</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">${fmtDate(t.datum)}${t.uhrzeit?` · ${t.uhrzeit.slice(0,5)} Uhr`:''}</div></div><div style="text-align:right;">${katBadge(t.kategorie_id)}<div style="font-size:11px;color:${u};font-weight:500;margin-top:4px;">${d===0?'Heute':d===1?'Morgen':'in '+d+' Tagen'}</div></div></div>`;}).join('') : '<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">Keine kommenden Termine</div></div>'}
      </div>
      <div class="card">
        <div class="flex-between mb-16"><span style="font-weight:500;font-size:15px;">Letzte Notizen</span><button class="btn btn-secondary btn-sm" onclick="showView('notizen')">Alle →</button></div>
        ${state.notizen.slice(0,4).length ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${state.notizen.slice(0,4).map(n=>`<div class="note-card card-sm" onclick="openNotizModal('${n.id}')"><div class="note-title">${n.titel}</div><div class="note-body" style="-webkit-line-clamp:2;">${n.inhalt||'<em style="color:var(--text3)">Kein Text</em>'}</div><div class="note-footer"><span class="note-date">${fmtDateShort(tsToDate(n.geaendert_am))}</span>${katBadge(n.kategorie_id)}</div></div>`).join('')}</div>` : '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Noch keine Notizen</div></div>'}
      </div>
    </div>`;
}

function renderKalender() {
  const year=state.calYear,month=state.calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const offset=(firstDay===0?6:firstDay-1);
  const daysInMonth=new Date(year,month+1,0).getDate();
  const daysInPrev=new Date(year,month,0).getDate();
  const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const todayStr=today();
  const tMap={};
  state.termine.forEach(t=>{if(!tMap[t.datum])tMap[t.datum]=[];tMap[t.datum].push(t);});
  let cells='';
  for(let i=0;i<Math.ceil((offset+daysInMonth)/7)*7;i++){
    let day,dateStr,isOther=false;
    if(i<offset){day=daysInPrev-offset+1+i;dateStr=new Date(year,month-1,day).toISOString().split('T')[0];isOther=true;}
    else if(i>=offset+daysInMonth){day=i-offset-daysInMonth+1;dateStr=new Date(year,month+1,day).toISOString().split('T')[0];isOther=true;}
    else{day=i-offset+1;dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;}
    const events=tMap[dateStr]||[];
    const pills=events.slice(0,2).map(e=>{const k=getKat(e.kategorie_id);const c=k?k.farbe:'var(--accent)';return `<div class="cal-event-pill" style="background:${c}22;color:${c};">${e.titel}</div>`;}).join('');
    cells+=`<div class="cal-day${dateStr===todayStr?' today':''}${isOther?' other-month':''}" onclick="calDayClick('${dateStr}')"><div class="cal-num">${day}</div><div class="cal-events">${pills}${events.length>2?`<div style="font-size:10px;color:var(--text3);">+${events.length-2}</div>`:''}</div></div>`;
  }
  document.getElementById('main-content').innerHTML=`<div class="card"><div class="cal-header"><button class="btn-icon" onclick="calNav(-1)">‹</button><span class="cal-month">${monthNames[month]} ${year}</span><button class="btn-icon" onclick="calNav(1)">›</button></div><div class="cal-grid">${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}${cells}</div></div>`;
}
window.calNav = (dir) => { state.calMonth+=dir; if(state.calMonth>11){state.calMonth=0;state.calYear++;} if(state.calMonth<0){state.calMonth=11;state.calYear--;} renderKalender(); };
window.calDayClick = (dateStr) => {
  const events=state.termine.filter(t=>t.datum===dateStr);
  if(!events.length){openTerminModal(null,dateStr);return;}
  showModal(`Termine am ${fmtDate(dateStr)}`,events.map(e=>`<div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border);"><div><div style="font-size:14px;font-weight:500;">${e.titel}</div><div style="font-size:12px;color:var(--text3);">${e.uhrzeit?e.uhrzeit.slice(0,5)+' Uhr':'Ganztägig'}</div>${e.beschreibung?`<div style="font-size:13px;color:var(--text2);margin-top:4px;">${e.beschreibung}</div>`:''}</div><div class="flex-center gap-8">${katBadge(e.kategorie_id)}<button class="btn-icon" onclick="openTerminModal('${e.id}');closeModal()">✏️</button><button class="btn-icon" onclick="deleteTermin('${e.id}')">🗑</button></div></div>`).join('')+`<div style="margin-top:16px;"><button class="btn btn-primary btn-sm" onclick="openTerminModal(null,'${dateStr}');closeModal()">+ Neuer Termin</button></div>`);
};

function renderZeitstrahl() {
  const all=[...state.termine.filter(t=>t.datum>=today()),...state.termine.filter(t=>t.datum<today()).reverse().slice(0,10)];
  if(!all.length){document.getElementById('main-content').innerHTML=`<div class="empty"><div class="empty-icon">📌</div><div class="empty-text">Noch keine Termine</div></div>`;return;}
  const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const groups={};
  all.forEach(t=>{const key=t.datum.slice(0,7);if(!groups[key])groups[key]=[];groups[key].push(t);});
  let html='<div class="timeline-container"><div class="timeline-line"></div>';
  Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).forEach(([key,items])=>{
    const [yr,mo]=key.split('-');
    html+=`<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;position:relative;left:-32px;padding-left:32px;">${monthNames[parseInt(mo)-1]} ${yr}</div>`;
    items.sort((a,b)=>a.datum.localeCompare(b.datum)).forEach(t=>{
      const k=getKat(t.kategorie_id);const dc=k?k.farbe:'var(--accent)';const isPast=t.datum<today();
      html+=`<div class="timeline-item"><div class="timeline-dot" style="background:${dc};box-shadow:0 0 0 3px var(--surface),0 0 0 5px ${dc}40;opacity:${isPast?'0.5':'1'}"></div><div class="timeline-content" style="opacity:${isPast?'0.6':'1'}"><div class="flex-between"><div><div class="timeline-date">${fmtDate(t.datum)}${t.uhrzeit?` · ${t.uhrzeit.slice(0,5)} Uhr`:''}</div><div class="timeline-title">${t.titel}</div>${t.beschreibung?`<div class="timeline-note">${t.beschreibung}</div>`:''}</div><div class="flex-center gap-8">${k?katBadge(t.kategorie_id):''}<button class="btn-icon" onclick="openTerminModal('${t.id}')">✏️</button><button class="btn-icon" onclick="deleteTermin('${t.id}')">🗑</button></div></div></div></div>`;
    });
    html+='</div>';
  });
  document.getElementById('main-content').innerHTML=html+'</div>';
}

window.renderNotizen = (filter='') => {
  let notes=state.notizen;
  if(filter) notes=notes.filter(n=>n.titel.toLowerCase().includes(filter.toLowerCase())||(n.inhalt||'').toLowerCase().includes(filter.toLowerCase()));
  document.getElementById('main-content').innerHTML=`<div style="margin-bottom:16px;"><input type="text" placeholder="Notizen suchen…" value="${filter}" oninput="renderNotizen(this.value)" style="max-width:280px;"></div>${notes.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;">${notes.map(n=>`<div class="note-card" onclick="openNotizModal('${n.id}')"><div class="note-title">${n.titel}</div><div class="note-body">${n.inhalt||'<em style="color:var(--text3)">Kein Text</em>'}</div><div class="note-footer"><span class="note-date">${fmtDateShort(tsToDate(n.geaendert_am))}</span>${katBadge(n.kategorie_id)}</div></div>`).join('')}</div>`:'<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Noch keine Notizen</div></div>'}`;
};

function renderKategorien() {
  document.getElementById('main-content').innerHTML=`<div class="card" style="max-width:560px;">${state.kategorien.length?state.kategorien.map(k=>{const tc=state.termine.filter(t=>t.kategorie_id===k.id).length;const nc=state.notizen.filter(n=>n.kategorie_id===k.id).length;return `<div class="cat-item"><div class="cat-color" style="background:${k.farbe}"></div><div class="cat-name">${k.name}</div><div class="cat-count">${tc} Termine · ${nc} Notizen</div><button class="btn-icon btn-sm" onclick="openKatModal('${k.id}')">✏️</button><button class="btn-icon btn-sm" onclick="deleteKat('${k.id}')">🗑</button></div>`;}).join(''):'<div class="empty"><div class="empty-icon">🏷️</div><div class="empty-text">Noch keine Kategorien</div></div>'}</div>`;
}

window.openTerminModal = (id=null,prefillDate=null) => {
  const t=id?state.termine.find(x=>x.id===id):null;
  const katOpts=state.kategorien.map(k=>`<option value="${k.id}" ${t?.kategorie_id===k.id?'selected':''}>${k.name}</option>`).join('');
  showModal(t?'Termin bearbeiten':'Neuer Termin',`<div class="form-group"><label>Titel *</label><input id="f-titel" type="text" value="${t?.titel||''}" placeholder="z.B. Mathematik Schularbeit"></div><div class="form-group"><label>Datum *</label><input id="f-datum" type="date" value="${t?.datum||prefillDate||today()}"></div><div class="form-group"><label>Uhrzeit</label><input id="f-uhrzeit" type="time" value="${t?.uhrzeit?.slice(0,5)||''}"></div><div class="form-group"><label>Kategorie</label><select id="f-kat"><option value="">— Keine —</option>${katOpts}</select></div><div class="form-group"><label>Beschreibung</label><textarea id="f-beschr">${t?.beschreibung||''}</textarea></div><div class="flex-between" style="margin-top:8px;">${t?`<button class="btn btn-danger btn-sm" onclick="deleteTermin('${t.id}')">Löschen</button>`:'<span></span>'}<div class="flex-center gap-8"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary btn-sm" onclick="saveTermin(${t?`'${t.id}'`:'null'})">Speichern</button></div></div>`);
};
window.saveTermin = async (id) => {
  const titel=document.getElementById('f-titel').value.trim();
  const datum=document.getElementById('f-datum').value;
  if(!titel||!datum){alert('Titel und Datum sind Pflichtfelder.');return;}
  const data={titel,datum,uhrzeit:document.getElementById('f-uhrzeit').value||'',kategorie_id:document.getElementById('f-kat').value||'',beschreibung:document.getElementById('f-beschr').value.trim()};
  try{if(id)await updateDoc(doc(db,'termine',id),data);else await addDoc(collection(db,'termine'),{...data,erstellt_am:serverTimestamp()});closeModal();await loadTermine();showView(state.currentView);}catch(e){alert('Fehler: '+e.message);}
};
window.deleteTermin = async (id) => { if(!confirm('Termin löschen?'))return; await deleteDoc(doc(db,'termine',id)); closeModal();await loadTermine();showView(state.currentView); };

window.openNotizModal = (id=null) => {
  const n=id?state.notizen.find(x=>x.id===id):null;
  const katOpts=state.kategorien.map(k=>`<option value="${k.id}" ${n?.kategorie_id===k.id?'selected':''}>${k.name}</option>`).join('');
  showModal(n?'Notiz bearbeiten':'Neue Notiz',`<div class="form-group"><label>Titel *</label><input id="n-titel" type="text" value="${n?.titel||''}" placeholder="z.B. Zusammenfassung Kapitel 3"></div><div class="form-group"><label>Kategorie</label><select id="n-kat"><option value="">— Keine —</option>${katOpts}</select></div><div class="form-group"><label>Inhalt</label><textarea id="n-inhalt" style="min-height:150px;">${n?.inhalt||''}</textarea></div><div class="flex-between" style="margin-top:8px;">${n?`<button class="btn btn-danger btn-sm" onclick="deleteNotiz('${n.id}')">Löschen</button>`:'<span></span>'}<div class="flex-center gap-8"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary btn-sm" onclick="saveNotiz(${n?`'${n.id}'`:'null'})">Speichern</button></div></div>`);
};
window.saveNotiz = async (id) => {
  const titel=document.getElementById('n-titel').value.trim();
  if(!titel){alert('Titel ist ein Pflichtfeld.');return;}
  const data={titel,kategorie_id:document.getElementById('n-kat').value||'',inhalt:document.getElementById('n-inhalt').value.trim(),geaendert_am:serverTimestamp()};
  try{if(id)await updateDoc(doc(db,'notizen',id),data);else await addDoc(collection(db,'notizen'),{...data,erstellt_am:serverTimestamp()});closeModal();await loadNotizen();showView(state.currentView);}catch(e){alert('Fehler: '+e.message);}
};
window.deleteNotiz = async (id) => { if(!confirm('Notiz löschen?'))return; await deleteDoc(doc(db,'notizen',id)); closeModal();await loadNotizen();showView(state.currentView); };

window.openKatModal = (id=null) => {
  const k=id?state.kategorien.find(x=>x.id===id):null;
  selectedColor=k?.farbe||COLORS[0];
  const swatches=COLORS.map(c=>`<div class="color-swatch${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('');
  showModal(k?'Kategorie bearbeiten':'Neue Kategorie',`<div class="form-group"><label>Name *</label><input id="k-name" type="text" value="${k?.name||''}" placeholder="z.B. Mathematik"></div><div class="form-group"><label>Farbe</label><div class="color-swatches">${swatches}</div></div><div class="flex-between" style="margin-top:16px;">${k?`<button class="btn btn-danger btn-sm" onclick="deleteKat('${k.id}')">Löschen</button>`:'<span></span>'}<div class="flex-center gap-8"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Abbrechen</button><button class="btn btn-primary btn-sm" onclick="saveKat(${k?`'${k.id}'`:'null'})">Speichern</button></div></div>`);
};
window.selectColor = (c,el) => { selectedColor=c; document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected')); el.classList.add('selected'); };
window.saveKat = async (id) => {
  const name=document.getElementById('k-name').value.trim();
  if(!name){alert('Name ist ein Pflichtfeld.');return;}
  const data={name,farbe:selectedColor};
  try{if(id)await updateDoc(doc(db,'kategorien',id),data);else await addDoc(collection(db,'kategorien'),{...data,erstellt_am:serverTimestamp()});closeModal();await loadKategorien();showView(state.currentView);}catch(e){alert('Fehler: '+e.message);}
};
window.deleteKat = async (id) => { if(!confirm('Kategorie löschen?'))return; await deleteDoc(doc(db,'kategorien',id)); closeModal();await loadAll();showView(state.currentView); };
</script>
</body>
